# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

# General
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -sg escape-time 10
set -g detach-on-destroy off

# Status bar on top
set -g status-position top
set -g status-justify "absolute-centre"

# Keybindings
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind x kill-pane

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Status left — session block
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#[bg=#{?client_prefix,#{@thm_red},#{@thm_mauve}},fg=#{@thm_bg},bold] 󰓩 #S "

# Status right — two blocks like nvim lualine
set -g status-right-length 100
set -g status-right "#[bg=#{@thm_blue},fg=#{@thm_bg}] 󰃭 %d %b #[bg=#{@thm_lavender},fg=#{@thm_bg},bold] 󰅐 %H:%M "

# Window style
set -g status-style "bg=default"
set -wg automatic-rename off

set -g window-status-format " #I: #W "
set -g window-status-style "bg=default,fg=#{@thm_overlay_0}"
set -g window-status-last-style "bg=default,fg=#{@thm_overlay_1}"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I: #W "
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"

run '~/.tmux/plugins/tpm/tpm'

# --- MONO override (must run AFTER tpm, since catppuccin sets @thm_* on load).
# Remaps only the vars used above to a greyscale ramp; blocks stay readable by
# brightness. Revert = delete this block (falls back to catppuccin mocha).
set -g @thm_bg "#000000"
set -g @thm_mauve "#e0e0e0"
set -g @thm_red "#ffffff"
set -g @thm_blue "#a0a0a0"
set -g @thm_lavender "#d0d0d0"
set -g @thm_overlay_0 "#606060"
set -g @thm_overlay_1 "#a0a0a0"
